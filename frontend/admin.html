<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel - Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-xl shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-red-600">Admin Dashboard</h1>
        
        <div class="mb-6 flex space-x-4">
            <input type="password" id="secretKey" placeholder="Enter Admin Secret Key" class="border p-2 rounded w-full">
            <button onclick="fetchStats()" class="bg-gray-800 text-white px-4 py-2 rounded">Load Data</button>
        </div>

        <h2 class="font-bold text-lg mb-2">API Failover Logs & Activity</h2>
        <div class="overflow-x-auto">
            <table class="min-w-full bg-white border">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="border px-4 py-2 text-left">Action</th>
                        <th class="border px-4 py-2 text-left">Provider</th>
                        <th class="border px-4 py-2 text-left">Status</th>
                    </tr>
                </thead>
                <tbody id="logTable">
                    <tr><td colspan="3" class="text-center p-4 text-gray-500">No data loaded</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const BACKEND_URL = "http://localhost:3000"; // লাইভ ডিপ্লয়ের পর পরিবর্তন করবেন

        async function fetchStats() {
            const secret = document.getElementById('secretKey').value;
            const res = await fetch(`${BACKEND_URL}/api/admin/stats?secret=${secret}`);
            const data = await res.json();

            if(data.success) {
                let html = '';
                data.logs.forEach(log => {
                    const statusColor = log.status === 'success' ? 'text-green-600' : 'text-red-600';
                    html += `
                    <tr>
                        <td class="border px-4 py-2">${log.action}</td>
                        <td class="border px-4 py-2 font-semibold">${log.provider}</td>
                        <td class="border px-4 py-2 font-bold ${statusColor}">${log.status.toUpperCase()}</td>
                    </tr>`;
                });
                document.getElementById('logTable').innerHTML = html;
            } else {
                alert("Unauthorized! Wrong Key.");
            }
        }
    </script>
</body>
</html>
