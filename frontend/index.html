<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Temp Mail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <div class="max-w-3xl mx-auto mt-10 p-6">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold text-blue-600 mb-2">Temporary Email</h1>
            <p class="text-gray-500">Protect your personal email from spam.</p>
        </div>

        <!-- Email Display Box -->
        <div class="bg-white p-6 rounded-2xl shadow-lg flex items-center justify-between border border-gray-100">
            <div class="overflow-hidden">
                <p class="text-sm text-gray-400 mb-1">Your Temporary Address:</p>
                <h2 id="email-display" class="text-2xl font-semibold text-gray-700 truncate">Loading...</h2>
            </div>
            <div class="flex space-x-3">
                <button onclick="copyEmail()" class="bg-blue-50 text-blue-600 p-3 rounded-xl hover:bg-blue-100 transition">
                    <i class="fas fa-copy"></i> Copy
                </button>
                <button onclick="generateNew()" class="bg-blue-600 text-white p-3 rounded-xl hover:bg-blue-700 transition">
                    <i class="fas fa-sync-alt"></i> New
                </button>
            </div>
        </div>

        <!-- Inbox Section -->
        <div class="mt-8 bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden">
            <div class="bg-gray-50 px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                <h3 class="font-semibold text-gray-700"><i class="fas fa-inbox mr-2"></i> Inbox</h3>
                <span class="text-xs text-green-500 flex items-center"><span class="animate-pulse h-2 w-2 bg-green-500 rounded-full mr-1"></span> Auto Refreshing</span>
            </div>
            <div id="inbox-container" class="p-6 text-center text-gray-500">
                <i class="fas fa-spinner fa-spin text-3xl mb-3 text-blue-500"></i>
                <p>Waiting for incoming emails...</p>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
